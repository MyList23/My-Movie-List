<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kevin's Recommendations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --blue: #278BF5;
      --blue-dark: #1a5dbb;
      --red: #e50914;
      --red-dark: #b20710;
      --green: #21d07a;
      --purple: #a855f7;
      --purple-dark: #7c3aed;
      --bg: #141414;
      --card-bg: #1a1a1a;
      --text-muted: rgba(255,255,255,0.5);
      --sidebar-width: 360px;
    }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: white;
    }

    /* ── Header ── */
    header {
      padding: 30px 40px 0;
      background: linear-gradient(180deg, #000 0%, #0a0a0a 100%);
      position: relative;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      color: var(--blue);
      margin: 0;
      font-size: 2.4rem;
      letter-spacing: 2px;
    }

    .subtitle {
      color: var(--text-muted);
      margin-top: 4px;
      font-size: 0.9rem;
    }

    .header-btns {
      position: absolute;
      top: 20px;
      right: 40px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .header-btns button {
      background-color: var(--blue);
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }

    .header-btns button:hover { background-color: var(--blue-dark); }

    #watchlistCount {
      display: none;
      background: white;
      color: var(--blue);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-left: 4px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      margin-top: 20px;
    }

    .tab-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 10px 22px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      letter-spacing: 0.02em;
    }

    .tab-btn:hover { color: rgba(255,255,255,0.75); }
    .tab-btn.active { color: white; border-bottom-color: var(--blue); }
    .tab-btn.shows-tab.active { border-bottom-color: var(--purple); }

    /* ── Admin form ── */
    #adminForm {
      display: none;
      padding: 16px 40px;
      background-color: #111;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    #adminForm input, #adminForm select {
      padding: 7px 12px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #1f1f1f;
      color: white;
      width: 200px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
    }

    #adminForm select { width: 140px; cursor: pointer; }
    #adminForm input::placeholder { color: rgba(255,255,255,0.35); }

    #adminForm button {
      padding: 7px 14px;
      border: none;
      border-radius: 4px;
      background-color: var(--blue);
      color: white;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      transition: background 0.2s;
    }

    #adminForm button:hover { background-color: var(--blue-dark); }

    /* ── Content panels ── */
    .content-panel { display: none; }
    .content-panel.active { display: block; }

    /* ── Grid ── */
    .movie-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
      padding: 40px;
    }

    /* ── Card ── */
    .movie-card {
      background-color: var(--card-bg);
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .movie-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .movie-card.show-card { border-color: rgba(168,85,247,0.15); }

    .poster-wrap { position: relative; overflow: hidden; }

    .movie-poster {
      width: 100%;
      height: 310px;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }

    .movie-card:hover .movie-poster { transform: scale(1.04); }

    .type-badge {
      position: absolute;
      top: 8px; left: 8px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--purple);
      color: white;
    }

    .movie-info {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .movie-title { font-size: 1rem; font-weight: 600; line-height: 1.3; margin-bottom: 5px; }
    .movie-rating { font-size: 0.8rem; font-weight: 500; margin-bottom: 6px; }

    .movie-meta {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.38);
      margin-bottom: 8px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .movie-meta .sep { opacity: 0.5; }

    .genre-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }

    .genre-chip {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid rgba(39,139,245,0.35);
      color: rgba(39,139,245,0.85);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .show-card .genre-chip {
      border-color: rgba(168,85,247,0.35);
      color: rgba(168,85,247,0.9);
    }

    .movie-crew {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.42);
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .movie-crew span { color: rgba(255,255,255,0.65); font-weight: 500; }

    .desc-wrap { position: relative; margin-bottom: 14px; flex: 1; }

    .movie-description {
      font-size: 0.8rem;
      line-height: 1.55;
      color: rgba(255,255,255,0.6);
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .movie-description.expanded {
      display: block;
      overflow: visible;
      -webkit-line-clamp: unset;
      -webkit-box-orient: unset;
    }

    .read-more-btn {
      background: none;
      border: none;
      padding: 0;
      margin-top: 4px;
      color: var(--blue);
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: none;
    }

    .show-card .read-more-btn { color: var(--purple); }
    .read-more-btn:hover { text-decoration: underline; }

    .movie-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .trailer-btn {
      display: inline-block;
      padding: 6px 12px;
      background-color: var(--red);
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 500;
      transition: background 0.2s;
    }

    .trailer-btn:hover { background-color: var(--red-dark); }

    .remove-btn {
      background: rgba(255,255,255,0.08);
      padding: 6px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      color: rgba(255,255,255,0.6);
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s, color 0.2s;
    }

    .remove-btn:hover { background: rgba(255,80,80,0.2); color: #ff6b6b; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #1f1f1f 25%, #2a2a2a 50%, #1f1f1f 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 10px;
      height: 420px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .loading-text {
      padding: 60px 40px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* ── Watchlist Sidebar ── */
    #watchlistOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      backdrop-filter: blur(2px);
    }

    #watchlistOverlay.open { display: block; }

    #watchlistSidebar {
      position: fixed;
      top: 0; right: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: #111;
      border-left: 1px solid rgba(255,255,255,0.08);
      z-index: 101;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    #watchlistSidebar.open { transform: translateX(0); }

    #watchlistHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    #watchlistClose {
      background: rgba(255,255,255,0.07);
      border: none;
      color: white;
      width: 30px; height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    #watchlistClose:hover { background: rgba(255,255,255,0.15); }

    /* Watchlist filter tabs */
    #watchlistFilterRow {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    .wl-filter-btn {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: rgba(255,255,255,0.4);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      padding: 9px 4px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -1px;
    }

    .wl-filter-btn:hover { color: rgba(255,255,255,0.7); }
    .wl-filter-btn.active { color: white; border-bottom-color: var(--blue); }
    .wl-filter-btn.shows.active { border-bottom-color: var(--purple); }

    #watchlistAddRow {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    #watchlistAddRow input {
      flex: 1;
      padding: 7px 10px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #1a1a1a;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
    }

    #watchlistAddRow input::placeholder { color: rgba(255,255,255,0.3); }

    #watchlistAddRow button {
      padding: 7px 12px;
      border: none;
      border-radius: 5px;
      background: var(--blue);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #watchlistAddRow button:hover { background: var(--blue-dark); }

    #watchlistSearchResults {
      flex-shrink: 0;
      overflow-y: auto;
      max-height: 280px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    #watchlistSearchResults:empty { display: none; }

    #watchlistSearchResults::-webkit-scrollbar { width: 4px; }
    #watchlistSearchResults::-webkit-scrollbar-track { background: transparent; }
    #watchlistSearchResults::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .search-result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }

    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: rgba(255,255,255,0.06); }

    .search-result-item img {
      width: 32px;
      height: 46px;
      object-fit: cover;
      border-radius: 3px;
      background: #333;
      flex-shrink: 0;
    }

    .search-result-info { flex: 1; min-width: 0; }

    .search-result-title {
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-result-meta {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }

    .search-result-type {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 1px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .search-result-type.movie { background: rgba(39,139,245,0.2); color: var(--blue); }
    .search-result-type.show  { background: rgba(168,85,247,0.2); color: var(--purple); }

    .search-results-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      padding: 8px 14px 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #watchlistTypeSelect {
      padding: 7px 6px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #1a1a1a;
      color: white;
      font-size: 0.85rem;
      cursor: pointer;
      flex-shrink: 0;
      width: 42px;
    }

    #watchlistItems {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #watchlistItems::-webkit-scrollbar { width: 4px; }
    #watchlistItems::-webkit-scrollbar-track { background: transparent; }
    #watchlistItems::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .watchlist-empty {
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 0.85rem;
      line-height: 1.7;
      margin-top: 40px;
    }

    .watchlist-item {
      background: #1a1a1a;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden;
      animation: slideIn 0.2s ease;
      flex-shrink: 0;
    }

    .watchlist-item.is-show { border-color: rgba(168,85,247,0.2); }
    .watchlist-item.watched-item { opacity: 0.55; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .watchlist-item-main {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 10px;
    }

    .watchlist-item img {
      width: 46px; height: 66px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: #333;
    }

    .watchlist-item-info { flex: 1; min-width: 0; }

    .watchlist-item-title {
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .watchlist-item-meta {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 4px;
    }

    .wl-type-pill {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 1px 6px;
      border-radius: 3px;
      margin-bottom: 5px;
    }

    .wl-type-pill.movie { background: rgba(39,139,245,0.2); color: var(--blue); }
    .wl-type-pill.show  { background: rgba(168,85,247,0.2); color: var(--purple); }

    .watchlist-item-watched {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      user-select: none;
    }

    .watchlist-item-watched input[type="checkbox"] {
      accent-color: var(--green);
      cursor: pointer;
      width: 13px; height: 13px;
    }

    .watchlist-item-watched.checked { color: var(--green); }

    .watchlist-item-remove {
      background: none;
      border: none;
      color: rgba(255,255,255,0.2);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
      align-self: flex-start;
    }

    .watchlist-item-remove:hover { color: #ff6b6b; background: rgba(255,80,80,0.1); }

    .watchlist-promote-row {
      display: none;
      padding: 8px 10px 10px;
      border-top: 1px solid rgba(255,255,255,0.05);
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .watchlist-promote-row.visible { display: flex; }

    .watchlist-promote-row input {
      flex: 1;
      min-width: 0;
      padding: 5px 8px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #222;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
    }

    .watchlist-promote-row input::placeholder { color: rgba(255,255,255,0.3); }

    .promote-btn {
      padding: 5px 10px;
      border: none;
      border-radius: 4px;
      background: var(--green);
      color: #000;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .promote-btn:hover { opacity: 0.85; }

    .watchlist-status {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      text-align: center;
      padding: 10px;
      flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,0.05);
      min-height: 36px;
    }
  </style>
</head>

<body>

<header>
  <h1>Kevin's Recommendations</h1>
  <div class="subtitle">Hand-picked movies, shows & anime worth your time</div>
  <div class="header-btns">
    <button id="watchlistToggle">🎬 Watchlist <span id="watchlistCount"></span></button>
    <button id="adminButton">Admin Mode</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active"    data-tab="movies">🎬 Movies</button>
    <button class="tab-btn shows-tab" data-tab="shows">📺 Shows & Anime</button>
  </div>
</header>

<div id="adminForm">
  <input  type="text" id="newTitle"   placeholder="Title">
  <input  type="text" id="newTrailer" placeholder="Trailer URL">
  <select id="newType">
    <option value="movie">Movie</option>
    <option value="show">Show / Anime</option>
  </select>
  <button id="addItemBtn">Add</button>
  
</div>

<div id="watchlistOverlay"></div>
<div id="watchlistSidebar">
  <div id="watchlistHeader">
    <span style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:1px;color:var(--blue)">🎬 My Watchlist</span>
    <button id="watchlistClose">✕</button>
  </div>

  <div id="watchlistFilterRow">
    <button class="wl-filter-btn active" data-filter="all">All</button>
    <button class="wl-filter-btn"        data-filter="movie">Movies</button>
    <button class="wl-filter-btn shows"  data-filter="show">Shows & Anime</button>
  </div>

  <div id="watchlistAddRow">
    <input type="text" id="watchlistInput" placeholder="Search to add…">
    <button id="watchlistAddBtn">Search</button>
  </div>

  <div id="watchlistSearchResults"></div>

  <div id="watchlistItems">
    <div class="watchlist-empty">Nothing here yet.<br>Type a title above to add it!</div>
  </div>
  <div class="watchlist-status" id="watchlistStatus"></div>
</div>

<div id="panel-movies" class="content-panel active">
  <div class="movie-container" id="movieContainer">
    <div class="loading-text">Loading movies…</div>
  </div>
</div>

<div id="panel-shows" class="content-panel">
  <div class="movie-container" id="showContainer">
    <div class="loading-text">Loading shows & anime…</div>
  </div>
</div>

<script>
  const apiKey        = "f994ef9b";
  const adminPassword = "kevin123";
  const webAppURL     = "https://script.google.com/macros/s/AKfycbwE0Mm6ilK4Qs__28V5J2zxoGsdx_4chdCk9vAK7VP71kALd6Fy_r7PKUuXqx22PL06PA/exec";

  let isAdmin   = false;
  let movies    = [];
  let shows     = [];
  let watchlist = [];      // { title, poster, year, rating, watched, type:'movie'|'show' }
  let wlFilter  = "all";  // 'all' | 'movie' | 'show'
  let activeTab = "movies";

  const movieContainer = document.getElementById("movieContainer");
  const showContainer  = document.getElementById("showContainer");

  // ── Tab switching ─────────────────────────────────────────────────────
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeTab = btn.dataset.tab;
      document.querySelectorAll(".content-panel").forEach(p => p.classList.remove("active"));
      document.getElementById(`panel-${activeTab}`).classList.add("active");
      if (isAdmin) {
        const typeSelect   = document.getElementById("newType");
        const trailerInput = document.getElementById("newTrailer");
        typeSelect.value         = activeTab === "shows" ? "show" : "movie";
        trailerInput.style.display = activeTab === "shows" ? "none" : "";
        trailerInput.value       = "";
      }
    });
  });

  // ── Watchlist filter tabs ─────────────────────────────────────────────
  document.querySelectorAll(".wl-filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".wl-filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      wlFilter = btn.dataset.filter;
      renderWatchlist();
    });
  });

  // ── Watchlist: load & save ────────────────────────────────────────────
  async function fetchWatchlist() {
    try {
      const res  = await fetch(`${webAppURL}?action=getWatchlist`, { redirect: "follow" });
      const data = await res.json();
      watchlist  = Array.isArray(data) ? data : [];
      watchlist.forEach(w => { if (!w.type) w.type = "movie"; }); // back-fill old entries
    } catch (e) {
      console.warn("Could not load watchlist:", e);
      watchlist = [];
    }
    renderWatchlist();
  }

  async function saveWatchlist() {
    setStatus("Saving…");
    try {
      await fetch(
        `${webAppURL}?action=saveWatchlist&data=${encodeURIComponent(JSON.stringify(watchlist))}`,
        { redirect: "follow" }
      );
      setStatus("Saved ✓");
      setTimeout(() => setStatus(""), 2500);
    } catch (e) {
      setStatus("Save failed");
      console.error(e);
    }
  }

  function setStatus(msg) { document.getElementById("watchlistStatus").textContent = msg; }

  // ── Watchlist: add ────────────────────────────────────────────────────
  // ── Watchlist: search OMDB and show picker ───────────────────────────
  async function searchAndShowResults(title) {
    if (!title) return;
    setStatus("Searching…");
    const resultsEl = document.getElementById("watchlistSearchResults");
    resultsEl.innerHTML = "";

    try {
      const res  = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(title)}&apikey=${apiKey}`);
      const data = await res.json();

      if (data.Response !== "True" || !data.Search || data.Search.length === 0) {
        setStatus("No results found.");
        setTimeout(() => setStatus(""), 2000);
        return;
      }

      setStatus("");

      // Show up to 6 results
      const results = data.Search.slice(0, 6);
      resultsEl.innerHTML = `<div class="search-results-label">Select one to add</div>`;

      results.forEach(item => {
        const isShow   = item.Type === "series" || item.Type === "episode";
        const typeKey  = isShow ? "show" : "movie";
        const typeLabel = isShow ? "Series" : item.Type === "movie" ? "Movie" : item.Type;
        const poster   = item.Poster && item.Poster !== "N/A" ? item.Poster : "https://via.placeholder.com/32x46?text=?";

        const row = document.createElement("div");
        row.className = "search-result-item";
        row.innerHTML = `
          <img src="${poster}" alt="${item.Title}">
          <div class="search-result-info">
            <div class="search-result-title">${item.Title}</div>
            <div class="search-result-meta">${item.Year || ""}</div>
          </div>
          <span class="search-result-type ${typeKey}">${typeLabel}</span>
        `;

        row.addEventListener("click", () => addToWatchlistFromResult(item, typeKey));
        resultsEl.appendChild(row);
      });

    } catch (e) {
      setStatus("Search failed.");
      setTimeout(() => setStatus(""), 2000);
    }
  }

  async function addToWatchlistFromResult(omdbItem, typeKey) {
    const resultsEl = document.getElementById("watchlistSearchResults");

    if (watchlist.some(w => w.title.toLowerCase() === omdbItem.Title.toLowerCase())) {
      setStatus("Already in your watchlist!");
      setTimeout(() => setStatus(""), 2000);
      return;
    }

    setStatus("Adding…");
    resultsEl.innerHTML = "";

    // Fetch full details for poster, rating etc
    let poster = "https://via.placeholder.com/300x450?text=No+Image";
    let year = "", rating = "";

    try {
      const res  = await fetch(`https://www.omdbapi.com/?i=${omdbItem.imdbID}&apikey=${apiKey}`);
      const data = await res.json();
      if (data.Response === "True") {
        poster = data.Poster && data.Poster !== "N/A" ? data.Poster : poster;
        year   = data.Year   && data.Year   !== "N/A" ? data.Year   : "";
        rating = data.imdbRating && data.imdbRating !== "N/A" ? data.imdbRating : "";
      }
    } catch (e) { /* use defaults */ }

    const firstWatched = watchlist.findIndex(w => w.watched);
    const insertAt     = firstWatched === -1 ? watchlist.length : firstWatched;
    watchlist.splice(insertAt, 0, { title: omdbItem.Title, poster, year, rating, watched: false, type: typeKey });

    await saveWatchlist();
    updateWatchlistCount();
    renderWatchlist();
    document.getElementById("watchlistInput").value = "";
  }

  async function addToWatchlist(title, chosenType) {
    if (!title) return;
    if (watchlist.some(w => w.title.toLowerCase() === title.toLowerCase())) {
      setStatus("Already in your watchlist!");
      setTimeout(() => setStatus(""), 2000);
      return;
    }

    setStatus("Looking up title…");

    let poster = "https://via.placeholder.com/300x450?text=No+Image";
    let year = "", rating = "", found = title;
    const omdbType = chosenType === "show" ? "series" : "movie";

    try {
      let res  = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&type=${omdbType}&apikey=${apiKey}`);
      let data = await res.json();

      if (data.Response === "True") {
        found  = data.Title  || title;
        poster = data.Poster && data.Poster !== "N/A" ? data.Poster : poster;
        year   = data.Year   && data.Year   !== "N/A" ? data.Year   : "";
        rating = data.imdbRating && data.imdbRating !== "N/A" ? data.imdbRating : "";
      }
    } catch (e) { /* use defaults */ }

    const firstWatched = watchlist.findIndex(w => w.watched);
    const insertAt     = firstWatched === -1 ? watchlist.length : firstWatched;
    watchlist.splice(insertAt, 0, { title: found, poster, year, rating, watched: false, type: chosenType });

    await saveWatchlist();
    updateWatchlistCount();
    renderWatchlist();
  }

  function removeFromWatchlist(title) {
    watchlist = watchlist.filter(w => w.title !== title);
    saveWatchlist();
    renderWatchlist();
    updateWatchlistCount();
  }

  function toggleWatched(title) {
    const item = watchlist.find(w => w.title === title);
    if (item) {
      item.watched = !item.watched;
      const unwatched = watchlist.filter(w => !w.watched);
      const watched   = watchlist.filter(w =>  w.watched);
      watchlist = [...unwatched, ...watched];
      saveWatchlist();
      renderWatchlist();
    }
  }

  function updateWatchlistCount() {
    const el      = document.getElementById("watchlistCount");
    const pending = watchlist.filter(w => !w.watched).length;
    if (watchlist.length > 0) {
      el.style.display = "inline";
      el.textContent   = pending > 0 ? pending : "✓";
    } else {
      el.style.display = "none";
    }
  }

  // ── Watchlist: promote to site ────────────────────────────────────────
  async function promoteToSite(title, trailerURL, type) {
    if (type !== "show" && !trailerURL) { setStatus("Paste a trailer URL first!"); setTimeout(() => setStatus(""), 2000); return; }
    setStatus("Adding to site…");
    const action = type === "show" ? "addShow" : "add";
    try {
      await fetch(
        `${webAppURL}?action=${action}&title=${encodeURIComponent(title)}&trailer=${encodeURIComponent(trailerURL || "")}`,
        { redirect: "follow" }
      );
      removeFromWatchlist(title);
      if (type === "show") { await fetchShows(); } else { await fetchMovies(); }
      setStatus("Added to recommendations! ✓");
      setTimeout(() => setStatus(""), 3000);
    } catch (e) {
      setStatus("Failed to add to site");
      console.error(e);
    }
  }

  // ── Watchlist: render ─────────────────────────────────────────────────
  function renderWatchlist() {
    const el = document.getElementById("watchlistItems");
    updateWatchlistCount();

    const filtered = wlFilter === "all" ? watchlist : watchlist.filter(w => w.type === wlFilter);

    if (filtered.length === 0) {
      const msg = wlFilter === "all"
        ? "Nothing here yet.<br>Type a title above to add it!"
        : `No ${wlFilter === "movie" ? "movies" : "shows or anime"} in your watchlist yet.`;
      el.innerHTML = `<div class="watchlist-empty">${msg}</div>`;
      return;
    }

    el.innerHTML = "";
    filtered.forEach(item => {
      const isShow = item.type === "show";
      const div    = document.createElement("div");
      div.className = `watchlist-item${item.watched ? ' watched-item' : ''}${isShow ? ' is-show' : ''}`;

      div.innerHTML = `
        <div class="watchlist-item-main">
          <img src="${item.poster}" alt="${item.title}">
          <div class="watchlist-item-info">
            <div class="watchlist-item-title">${item.title}</div>
            <div class="watchlist-item-meta">${[item.year, item.rating ? '★ ' + item.rating : ''].filter(Boolean).join(' · ')}</div>
            <span class="wl-type-pill ${isShow ? 'show' : 'movie'}">${isShow ? 'Show / Anime' : 'Movie'}</span>
            <label class="watchlist-item-watched ${item.watched ? 'checked' : ''}">
              <input type="checkbox" ${item.watched ? 'checked' : ''}>${item.watched ? 'Watched ✓' : 'Mark as watched'}
            </label>
          </div>
          <button class="watchlist-item-remove" title="Remove">✕</button>
        </div>
        <div class="watchlist-promote-row ${item.watched ? 'visible' : ''}">
          ${isShow ? '' : '<input type="text" placeholder="Paste trailer URL…" class="promote-input">'}
          <button class="promote-btn">${isShow ? '➕ Add to Shows' : '➕ Add to Site'}</button>
        </div>
      `;

      div.querySelector("input[type='checkbox']").addEventListener("change", () => toggleWatched(item.title));
      div.querySelector(".watchlist-item-remove").addEventListener("click", () => removeFromWatchlist(item.title));
      div.querySelector(".promote-btn").addEventListener("click", () => {
        const inputEl = div.querySelector(".promote-input");
        const url = inputEl ? inputEl.value.trim() : "";
        promoteToSite(item.title, url, item.type);
      });

      el.appendChild(div);
    });
  }

  // ── Sidebar open / close ──────────────────────────────────────────────
  function openSidebar() {
    document.getElementById("watchlistSidebar").classList.add("open");
    document.getElementById("watchlistOverlay").classList.add("open");
    document.getElementById("watchlistInput").focus();
  }

  function closeSidebar() {
    document.getElementById("watchlistSidebar").classList.remove("open");
    document.getElementById("watchlistOverlay").classList.remove("open");
  }

  document.getElementById("watchlistToggle").addEventListener("click", openSidebar);
  document.getElementById("watchlistClose").addEventListener("click", closeSidebar);
  document.getElementById("watchlistOverlay").addEventListener("click", closeSidebar);

  document.getElementById("watchlistAddBtn").addEventListener("click", () => {
    const input = document.getElementById("watchlistInput");
    const val   = input.value.trim();
    if (val) searchAndShowResults(val);
  });

  document.getElementById("watchlistInput").addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const input = document.getElementById("watchlistInput");
      const val   = input.value.trim();
      if (val) searchAndShowResults(val);
    }
  });

  // Clear search results when input is cleared
  document.getElementById("watchlistInput").addEventListener("input", e => {
    if (!e.target.value) document.getElementById("watchlistSearchResults").innerHTML = "";
  });

  // ── Generic card builder ──────────────────────────────────────────────
  function buildCard(item, index, skeletons, container, isShow) {
    const omdbType = isShow ? "series" : "movie";
    fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(item.title)}&type=${omdbType}&apikey=${apiKey}`)
      .then(res => res.json())
      .then(data => {
        const poster = data.Poster && data.Poster !== "N/A"
          ? data.Poster : "https://via.placeholder.com/300x450?text=No+Image";

        const rating = data.imdbRating && data.imdbRating !== "N/A"
          ? parseFloat(data.imdbRating) : 0;

        let ratingColor = '#db2360';
        if (rating >= 8) ratingColor = '#21d07a';
        else if (rating >= 5) ratingColor = '#d2d531';

        const description = data.Plot     && data.Plot     !== "N/A" ? data.Plot     : "No description available.";
        const year        = data.Year     && data.Year     !== "N/A" ? data.Year     : "";
        const runtime     = data.Runtime  && data.Runtime  !== "N/A" ? data.Runtime  : "";
        const director    = data.Director && data.Director !== "N/A" ? data.Director : "";
        const actors      = data.Actors   && data.Actors   !== "N/A" ? data.Actors   : "";
        const seasons     = data.totalSeasons && data.totalSeasons !== "N/A" ? `${data.totalSeasons} seasons` : "";
        const genres      = data.Genre    && data.Genre    !== "N/A"
          ? data.Genre.split(",").map(g => `<span class="genre-chip">${g.trim()}</span>`).join("") : "";

        const metaRight = isShow ? seasons : runtime;
        const metaParts = [year, metaRight].filter(Boolean);
        const metaHTML  = metaParts.length ? `<div class="movie-meta">${metaParts.join('<span class="sep">·</span>')}</div>` : "";
        const genreHTML = genres ? `<div class="genre-chips">${genres}</div>` : "";
        const dirLabel  = isShow ? "Creator" : "Dir.";
        const crewHTML  = (director || actors) ? `
          <div class="movie-crew">
            ${director ? `<div>${dirLabel} <span>${director}</span></div>` : ""}
            ${actors   ? `<div>Cast <span>${actors}</span></div>`          : ""}
          </div>` : "";

        const removeBtnHTML = isAdmin ? `<button class="remove-btn">Remove</button>` : "";
        const badgeHTML     = isShow  ? `<span class="type-badge">Show / Anime</span>` : "";

        const card     = document.createElement("div");
        card.className = `movie-card${isShow ? ' show-card' : ''}`;
        card.innerHTML = `
          <div class="poster-wrap">
            <img class="movie-poster" src="${poster}" alt="${item.title} Poster" loading="lazy">
            ${badgeHTML}
          </div>
          <div class="movie-info">
            <div class="movie-title">${item.title}</div>
            <div class="movie-rating" style="color:${ratingColor}">★ ${data.imdbRating || "N/A"} IMDb</div>
            ${metaHTML}
            ${genreHTML}
            ${crewHTML}
            <div class="desc-wrap">
              <p class="movie-description">${description}</p>
              <button class="read-more-btn">Read more ›</button>
            </div>
            <div class="movie-actions">
              ${isShow ? '' : `<a class="trailer-btn" href="${item.trailer}" target="_blank" rel="noopener noreferrer">▶ Trailer</a>`}
              ${removeBtnHTML}
            </div>
          </div>
        `;

        if (skeletons[index]) container.replaceChild(card, skeletons[index]);
        else container.appendChild(card);

        const descEl = card.querySelector(".movie-description");
        const rmBtn  = card.querySelector(".read-more-btn");
        if (descEl.scrollHeight > descEl.clientHeight + 2) {
          rmBtn.style.display = "inline";
          rmBtn.addEventListener("click", () => {
            const expanded = descEl.classList.toggle("expanded");
            rmBtn.textContent = expanded ? "Read less ‹" : "Read more ›";
          });
        }

        if (isAdmin) {
          const removeAction = isShow ? "removeShow" : "remove";
          card.querySelector(".remove-btn").addEventListener("click", async () => {
            if (confirm(`Remove "${item.title}"?`)) {
              try {
                await fetch(`${webAppURL}?action=${removeAction}&index=${index}`, { redirect: "follow" });
                if (isShow) await fetchShows(); else await fetchMovies();
              } catch (err) {
                alert("Failed to remove.");
                console.error(err);
              }
            }
          });
        }
      })
      .catch(err => {
        console.error(`OMDB error for ${item.title}:`, err);
        if (skeletons[index]) skeletons[index].remove();
      });
  }

  // ── Movies ────────────────────────────────────────────────────────────
  async function fetchMovies() {
    try {
      const res = await fetch(`${webAppURL}?t=${Date.now()}`, { redirect: "follow" });
      movies    = await res.json();
      renderMovies();
    } catch (err) {
      console.error("Error fetching movies:", err);
      movieContainer.innerHTML = "<p style='padding:40px;color:rgba(255,255,255,0.4)'>Failed to load movies.</p>";
    }
  }

  function renderMovies() {
    movieContainer.innerHTML = "";
    movies.forEach(() => {
      const s = document.createElement("div");
      s.className = "skeleton";
      movieContainer.appendChild(s);
    });
    const skeletons = movieContainer.querySelectorAll(".skeleton");
    [...movies].forEach((m, i) => buildCard(m, i, skeletons, movieContainer, false));
  }

  // ── Shows ─────────────────────────────────────────────────────────────
  async function fetchShows() {
    try {
      const res = await fetch(`${webAppURL}?action=getShows&t=${Date.now()}`, { redirect: "follow" });
      const data = await res.json();
      shows = Array.isArray(data) ? data : [];
      renderShows();
    } catch (err) {
      console.error("Error fetching shows:", err);
      showContainer.innerHTML = "<p style='padding:40px;color:rgba(255,255,255,0.4)'>Failed to load shows.</p>";
    }
  }

  function renderShows() {
    showContainer.innerHTML = "";
    if (shows.length === 0) {
      showContainer.innerHTML = "<p style='padding:40px;color:rgba(255,255,255,0.4)'>No shows added yet.</p>";
      return;
    }
    shows.forEach(() => {
      const s = document.createElement("div");
      s.className = "skeleton";
      showContainer.appendChild(s);
    });
    const skeletons = showContainer.querySelectorAll(".skeleton");
    [...shows].forEach((s, i) => buildCard(s, i, skeletons, showContainer, true));
  }

  // ── Admin ─────────────────────────────────────────────────────────────
  document.getElementById("adminButton").addEventListener("click", () => {
    const password = prompt("Enter admin password:");
    if (password === adminPassword) {
      isAdmin = true;
      document.getElementById("adminForm").style.display = "flex";
      document.getElementById("adminButton").textContent = "Admin: ON";
      renderMovies();
      renderShows();
      alert("Admin mode unlocked!");
    } else {
      alert("Incorrect password!");
    }
  });

  // Toggle trailer field visibility based on type selection
  document.getElementById("newType").addEventListener("change", function() {
    const trailerInput = document.getElementById("newTrailer");
    trailerInput.style.display = this.value === "show" ? "none" : "";
    trailerInput.value = "";
  });

  document.getElementById("addItemBtn").addEventListener("click", async () => {
    const title   = document.getElementById("newTitle").value.trim();
    const trailer = document.getElementById("newTrailer").value.trim();
    const type    = document.getElementById("newType").value;
    if (!title) { alert("Please enter a title!"); return; }
    if (type === "movie" && !trailer) { alert("Please enter a trailer URL for movies!"); return; }
    const action = type === "show" ? "addShow" : "add";
    try {
      await fetch(
        `${webAppURL}?action=${action}&title=${encodeURIComponent(title)}&trailer=${encodeURIComponent(trailer)}`,
        { redirect: "follow" }
      );
      document.getElementById("newTitle").value   = "";
      document.getElementById("newTrailer").value = "";
      if (type === "show") await fetchShows(); else await fetchMovies();
    } catch (err) {
      alert("Failed to add.");
      console.error(err);
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────
  fetchWatchlist();
  fetchMovies();
  fetchShows();
</script>

</body>
