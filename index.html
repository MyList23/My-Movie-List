<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Watchlist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --blue: #278BF5;
      --blue-dark: #1a5dbb;
      --red: #e50914;
      --red-dark: #b20710;
      --green: #21d07a;
      --purple: #a855f7;
      --purple-dark: #7c3aed;
      --bg: #141414;
      --card-bg: #1a1a1a;
      --text-muted: rgba(255,255,255,0.5);
      --sidebar-width: 360px;
    }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: white;
    }

    /* ── Header ── */
    header {
      padding: 30px 40px 0;
      background: linear-gradient(180deg, #000 0%, #0a0a0a 100%);
      position: relative;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      color: var(--blue);
      margin: 0;
      font-size: 2.4rem;
      letter-spacing: 2px;
    }

    .subtitle {
      color: var(--text-muted);
      margin-top: 4px;
      font-size: 0.9rem;
    }

    .header-btns {
      position: absolute;
      top: 20px;
      right: 40px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .header-btns button {
      background-color: var(--blue);
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }

    .header-btns button:hover { background-color: var(--blue-dark); }

    #watchlistCount {
      display: none;
      background: white;
      color: var(--blue);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-left: 4px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      align-items: center;
      margin-top: 20px;
    }

    .tabs-right {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
      padding-bottom: 2px;
    }

    .tabs-right button {
      background: rgba(255,255,255,0.07);
      border: none;
      padding: 5px 12px;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .tabs-right button:hover { background: rgba(255,255,255,0.14); }
    .tabs-right #randomPickBtn { background: rgba(39,139,245,0.2); color: var(--blue); }
    .tabs-right #randomPickBtn:hover { background: rgba(39,139,245,0.35); }

    .tab-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 10px 22px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      letter-spacing: 0.02em;
    }

    .tab-btn:hover { color: rgba(255,255,255,0.75); }
    .tab-btn.active { color: white; border-bottom-color: var(--blue); }
    .tab-btn.shows-tab.active { border-bottom-color: var(--purple); }
    .tab-btn.anime-tab.active { border-bottom-color: #f97316; }

    #recentStrip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 10px 40px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      overflow-x: auto;
    }

    #recentStrip .recent-left { display: none; }
    #recentStrip::-webkit-scrollbar { display: none; }

    .strip-right {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      margin-left: auto;
    }

    .recent-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .recent-items {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .recent-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px;
      padding: 5px 10px 5px 5px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .recent-item img {
      width: 24px;
      height: 34px;
      object-fit: cover;
      border-radius: 3px;
      background: #333;
    }

    .recent-item-title {
      font-size: 0.78rem;
      font-weight: 600;
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-item-meta {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.35);
      margin-top: 1px;
    }

    .recent-new-badge {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--blue);
      color: white;
      flex-shrink: 0;
    }

    .recent-item.is-show .recent-new-badge { background: var(--purple); }

    /* ── Sidebar Recently Watched ── */
    #sidebarRecentlyWatched {
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .srw-header {
      margin-bottom: 10px;
    }

    .srw-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .srw-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }

    .srw-scroll::-webkit-scrollbar { height: 3px; }
    .srw-scroll::-webkit-scrollbar-track { background: transparent; }
    .srw-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .srw-card {
      flex-shrink: 0;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .srw-card:hover { opacity: 0.75; }

    .srw-card img {
      width: 46px;
      height: 66px;
      object-fit: cover;
      border-radius: 5px;
      display: block;
      background: #222;
    }

    .srw-card-title {
      font-size: 0.62rem;
      font-weight: 600;
      margin-top: 5px;
      width: 46px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: rgba(255,255,255,0.7);
    }

    /* ── Admin form ── */
    #adminForm {
      display: none;
      padding: 16px 40px;
      background-color: #111;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    #adminForm input, #adminForm select {
      padding: 7px 12px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #1f1f1f;
      color: white;
      width: 200px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
    }

    #adminForm select { width: 140px; cursor: pointer; }
    #adminForm input::placeholder { color: rgba(255,255,255,0.35); }

    #adminForm button {
      padding: 7px 14px;
      border: none;
      border-radius: 4px;
      background-color: var(--blue);
      color: white;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      transition: background 0.2s;
    }

    #adminForm button:hover { background-color: var(--blue-dark); }

    /* ── Content panels ── */
    .content-panel { display: none; }
    .content-panel.active { display: block; }

    /* ── Grid ── */
    .movie-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
      padding: 40px;
    }

    /* ── Card ── */
    .movie-card {
      background-color: var(--card-bg);
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .movie-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .movie-card.show-card  { border-color: rgba(168,85,247,0.15); }
    .movie-card.anime-card { border-color: rgba(249,115,22,0.15); }

    .poster-wrap { position: relative; overflow: hidden; }

    .movie-poster {
      width: 100%;
      height: 310px;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }

    .movie-card:hover .movie-poster { transform: scale(1.04); }

    .type-badge {
      position: absolute;
      top: 8px; left: 8px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--purple);
      color: white;
    }

    .movie-info {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .movie-title { font-size: 1rem; font-weight: 600; line-height: 1.3; margin-bottom: 5px; }
    .movie-rating { font-size: 0.8rem; font-weight: 500; margin-bottom: 6px; }

    .movie-meta {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.38);
      margin-bottom: 8px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .movie-meta .sep { opacity: 0.5; }

    .genre-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }

    .genre-chip {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid rgba(39,139,245,0.35);
      color: rgba(39,139,245,0.85);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .show-card .genre-chip {
      border-color: rgba(168,85,247,0.35);
      color: rgba(168,85,247,0.9);
    }

    .anime-card .genre-chip {
      border-color: rgba(249,115,22,0.35);
      color: rgba(249,115,22,0.9);
    }

    .movie-crew {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.42);
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .movie-crew span { color: rgba(255,255,255,0.65); font-weight: 500; }

    .desc-wrap { position: relative; margin-bottom: 14px; flex: 1; }

    .movie-description {
      font-size: 0.8rem;
      line-height: 1.55;
      color: rgba(255,255,255,0.6);
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .movie-description.expanded {
      display: block;
      overflow: visible;
      -webkit-line-clamp: unset;
      -webkit-box-orient: unset;
    }

    .read-more-btn {
      background: none;
      border: none;
      padding: 0;
      margin-top: 4px;
      color: var(--blue);
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: none;
    }

    .show-card .read-more-btn  { color: var(--purple); }
    .anime-card .read-more-btn { color: #f97316; }
    .read-more-btn:hover { text-decoration: underline; }

    .movie-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .trailer-btn {
      display: inline-block;
      padding: 6px 12px;
      background-color: var(--red);
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 500;
      transition: background 0.2s;
    }

    .trailer-btn:hover { background-color: var(--red-dark); }

    .remove-btn {
      background: rgba(255,255,255,0.08);
      padding: 6px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      color: rgba(255,255,255,0.6);
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s, color 0.2s;
    }

    .remove-btn:hover { background: rgba(255,80,80,0.2); color: #ff6b6b; }

    /* ── Random Pick Modal ── */
    #randomPickOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #randomPickOverlay.open { display: flex; }

    #randomPickModal {
      background: #1a1a1a;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      max-width: 480px;
      width: 100%;
      overflow: hidden;
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
    }

    #randomPickModal.is-show { border-color: rgba(168,85,247,0.25); }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    #randomPickModal .modal-poster-wrap {
      position: relative;
      height: 260px;
      overflow: hidden;
    }

    #randomPickModal .modal-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      display: block;
    }

    #randomPickModal .modal-poster-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(transparent, #1a1a1a);
    }

    #randomPickModal .modal-close {
      position: absolute;
      top: 12px; right: 12px;
      background: rgba(0,0,0,0.6);
      border: none;
      color: white;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 1;
    }

    #randomPickModal .modal-close:hover { background: rgba(0,0,0,0.9); }

    #randomPickModal .modal-body {
      padding: 16px 22px 24px;
    }

    #randomPickModal .modal-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 6px;
    }

    #randomPickModal.is-show .modal-label { color: var(--purple); }

    #randomPickModal .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 1px;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    #randomPickModal .modal-meta {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    #randomPickModal .modal-rating {
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    #randomPickModal .modal-genres {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 12px;
    }

    #randomPickModal .modal-plot {
      font-size: 0.82rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.6);
      margin-bottom: 18px;
    }

    #randomPickModal .modal-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #randomPickModal .modal-reroll {
      background: rgba(255,255,255,0.08);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #randomPickModal .modal-reroll:hover { background: rgba(255,255,255,0.15); }

    /* ── Tab Toolbar ── */
    .sort-select {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 7px 10px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
      height: 34px;
    }

    .sort-select option { background: #1a1a1a; }

    .card-count {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
      margin-left: auto;
    }

    /* ── Featured Pin ── */
    .featured-pin {
      margin: 24px 40px 0;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      display: none;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .featured-pin.visible { display: flex; }

    .featured-pin-poster {
      width: 120px;
      flex-shrink: 0;
      object-fit: cover;
      display: block;
    }

    .featured-pin-body {
      padding: 18px 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .featured-pin-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: gold;
      margin-bottom: 2px;
    }

    .featured-pin-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      letter-spacing: 1px;
      line-height: 1.1;
    }

    .featured-pin-meta {
      font-size: 0.76rem;
      color: rgba(255,255,255,0.4);
    }

    .featured-pin-plot {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      margin-top: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .featured-pin-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      align-items: center;
    }

    .featured-unpin-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.4);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.72rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .featured-unpin-btn:hover { border-color: rgba(255,255,255,0.4); color: white; }

    .pin-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.2);
      font-size: 1rem;
      cursor: pointer;
      position: absolute;
      top: 8px; right: 8px;
      transition: color 0.2s;
      display: none;
      padding: 4px;
    }

    .pin-btn:hover { color: gold; }
    .movie-card:hover .pin-btn { display: block; }
    .pin-btn.pinned { display: block; color: gold; }
    .skeleton {
      background: linear-gradient(90deg, #1f1f1f 25%, #2a2a2a 50%, #1f1f1f 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 10px;
      height: 420px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .loading-text {
      padding: 60px 40px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* ── Watchlist Sidebar ── */
    #watchlistOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      backdrop-filter: blur(2px);
    }

    #watchlistOverlay.open { display: block; }

    #watchlistSidebar {
      position: fixed;
      top: 0; right: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: #111;
      border-left: 1px solid rgba(255,255,255,0.08);
      z-index: 101;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    #watchlistSidebar.open { transform: translateX(0); }

    #watchlistHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    #watchlistClose {
      background: rgba(255,255,255,0.07);
      border: none;
      color: white;
      width: 30px; height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    #watchlistClose:hover { background: rgba(255,255,255,0.15); }

    /* Watchlist filter tabs */
    #watchlistFilterRow {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    .wl-filter-btn {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: rgba(255,255,255,0.4);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      padding: 9px 4px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -1px;
    }

    .wl-filter-btn:hover { color: rgba(255,255,255,0.7); }
    .wl-filter-btn.active { color: white; border-bottom-color: var(--blue); }
    .wl-filter-btn.shows.active { border-bottom-color: var(--purple); }

<script>
  const apiKey        = "f994ef9b";
  const adminPasswordHash = "1f3bfa0d925578782ad3b34c85d0aed058601e2025a98dc7ede3b7000a2393e9";

  async function checkPassword(input) {
    const encoder = new TextEncoder();
    const data    = encoder.encode(input);
    const hashBuf = await crypto.subtle.digest("SHA-256", data);
    const hashArr = Array.from(new Uint8Array(hashBuf));
    return hashArr.map(b => b.toString(16).padStart(2, "0")).join("");
  }
  const webAppURL     = "https://script.google.com/macros/s/AKfycby8RMQ7abVAHEaKMkI7g3xERkERxyXYLA_rrbXJXRukZL5Kaec6ZyP-TJ0wq9sxrigHXA/exec";

  let isAdmin   = false;
  let movies    = [];
  let shows     = [];
  let anime     = [];
  let watchlist = [];
  let wlFilter  = "all";
  let activeTab = "movies";

  // Pinned titles per tab
  const pinned = { movies: null, shows: null, anime: null };

  async function fetchPinned() {
    try {
      const res  = await fetch(`${webAppURL}?action=getPinned`, { redirect: "follow" });
      const data = await res.json();
      if (data.movies) pinned.movies = data.movies;
      if (data.shows)  pinned.shows  = data.shows;
      if (data.anime)  pinned.anime  = data.anime;
    } catch(e) {}
  }

  async function savePinned() {
    try {
      await fetch(
        `${webAppURL}?action=savePinned&data=${encodeURIComponent(JSON.stringify(pinned))}`,
        { redirect: "follow" }
      );
    } catch(e) { console.error("Failed to save pinned:", e); }
  }
  // Rating cache: title -> float
  const ratingCache = {};

  const movieContainer = document.getElementById("movieContainer");
  const showContainer  = document.getElementById("showContainer");
  const animeContainer = document.getElementById("animeContainer");

  // ── Tab switching ─────────────────────────────────────────────────────
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeTab = btn.dataset.tab;
      document.querySelectorAll(".content-panel").forEach(p => p.classList.remove("active"));
      document.getElementById(`panel-${activeTab}`).classList.add("active");
      // Swap sort dropdowns
      document.getElementById("sortMovies-wrap").style.display = activeTab === "movies" ? "" : "none";
      document.getElementById("sortShows-wrap").style.display  = activeTab === "shows"  ? "" : "none";
      document.getElementById("sortAnime-wrap").style.display  = activeTab === "anime"  ? "" : "none";
      // Swap card counts
      document.getElementById("countMovies").style.display = activeTab === "movies" ? "" : "none";
      document.getElementById("countShows").style.display  = activeTab === "shows"  ? "" : "none";
      document.getElementById("countAnime").style.display  = activeTab === "anime"  ? "" : "none";
      if (isAdmin) {
        const typeSelect   = document.getElementById("newType");
        const trailerInput = document.getElementById("newTrailer");
        if (activeTab === "shows")  typeSelect.value = "show";
        else if (activeTab === "anime") typeSelect.value = "anime";
        else typeSelect.value = "movie";
        trailerInput.style.display = (activeTab === "shows" || activeTab === "anime") ? "none" : "";
        trailerInput.value = "";
      }
    });
  });

  // ── Watchlist filter tabs ─────────────────────────────────────────────
  document.querySelectorAll(".wl-filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".wl-filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      wlFilter = btn.dataset.filter;
      renderWatchlist();
    });
  });

  // ── Watchlist: load & save ────────────────────────────────────────────
  async function fetchWatchlist() {
    try {
      const res  = await fetch(`${webAppURL}?action=getWatchlist`, { redirect: "follow" });
      const data = await res.json();
      watchlist  = Array.isArray(data) ? data : [];
      watchlist.forEach(w => { if (!w.type) w.type = "movie"; }); // back-fill old entries
    } catch (e) {
      console.warn("Could not load watchlist:", e);
      watchlist = [];
    }
    renderWatchlist();
    renderRecentlyWatched();
  }

  async function saveWatchlist() {
    setStatus("Saving…");
    try {
      await fetch(
        `${webAppURL}?action=saveWatchlist&data=${encodeURIComponent(JSON.stringify(watchlist))}`,
        { redirect: "follow" }
      );
      setStatus("Saved ✓");
      setTimeout(() => setStatus(""), 2500);
    } catch (e) {
      setStatus("Save failed");
      console.error(e);
    }
  }

  function setStatus(msg) { document.getElementById("watchlistStatus").textContent = msg; }

  // ── Watchlist: add ────────────────────────────────────────────────────
  // ── Watchlist: search OMDB and show picker ───────────────────────────
  async function searchAndShowResults(title) {
    if (!title) return;
    setStatus("Searching…");
    const resultsEl = document.getElementById("watchlistSearchResults");
    resultsEl.innerHTML = "";

    try {
      const res  = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(title)}&apikey=${apiKey}`);
      const data = await res.json();

      if (data.Response !== "True" || !data.Search || data.Search.length === 0) {
        setStatus("No results found.");
        setTimeout(() => setStatus(""), 2000);
        return;
      }

      setStatus("");

      // Show up to 6 results
      const results = data.Search.slice(0, 6);
      resultsEl.innerHTML = `<div class="search-results-label">Select one to add</div>`;

      results.forEach(item => {
        const isSeries = item.Type === "series" || item.Type === "episode";
        const typeKey  = isSeries ? "show" : "movie";
        const typeLabel = isSeries ? "Series" : item.Type === "movie" ? "Movie" : item.Type;
        const poster   = item.Poster && item.Poster !== "N/A" ? item.Poster : "https://via.placeholder.com/32x46?text=?";

        const row = document.createElement("div");
        row.className = "search-result-item";
        row.innerHTML = `
          <img src="${poster}" alt="${item.Title}">
          <div class="search-result-info">
            <div class="search-result-title">${item.Title}</div>
            <div class="search-result-meta">${item.Year || ""}</div>
          </div>
          ${isSeries ? `
            <select class="series-type-picker" onclick="event.stopPropagation()">
              <option value="show">Show</option>
              <option value="anime">Anime</option>
            </select>
          ` : `<span class="search-result-type ${typeKey}">${typeLabel}</span>`}
        `;

        row.addEventListener("click", () => {
          const picker = row.querySelector(".series-type-picker");
          const finalType = picker ? picker.value : typeKey;
          addToWatchlistFromResult(item, finalType);
        });
        resultsEl.appendChild(row);
      });

    } catch (e) {
      setStatus("Search failed.");
      setTimeout(() => setStatus(""), 2000);
    }
  }

  async function addToWatchlistFromResult(omdbItem, typeKey) {
    const resultsEl = document.getElementById("watchlistSearchResults");

    if (watchlist.some(w => w.title.toLowerCase() === omdbItem.Title.toLowerCase())) {
      setStatus("Already in your watchlist!");
      setTimeout(() => setStatus(""), 2000);
      return;
    }

    setStatus("Adding…");
    resultsEl.innerHTML = "";

    // Fetch full details for poster, rating etc
    let poster = "https://via.placeholder.com/300x450?text=No+Image";
    let year = "", rating = "";

    try {
      const res  = await fetch(`https://www.omdbapi.com/?i=${omdbItem.imdbID}&apikey=${apiKey}`);
      const data = await res.json();
      if (data.Response === "True") {
        poster = data.Poster && data.Poster !== "N/A" ? data.Poster : poster;
        year   = data.Year   && data.Year   !== "N/A" ? data.Year   : "";
        rating = data.imdbRating && data.imdbRating !== "N/A" ? data.imdbRating : "";
      }
    } catch (e) { /* use defaults */ }

    const firstWatched = watchlist.findIndex(w => w.watched);
    const insertAt     = firstWatched === -1 ? watchlist.length : firstWatched;
    watchlist.splice(insertAt, 0, { title: omdbItem.Title, poster, year, rating, watched: false, type: typeKey });

    await saveWatchlist();
    updateWatchlistCount();
    renderWatchlist();
    document.getElementById("watchlistInput").value = "";
  }

  async function addToWatchlist(title, chosenType) {
    if (!title) return;
    if (watchlist.some(w => w.title.toLowerCase() === title.toLowerCase())) {
      setStatus("Already in your watchlist!");
      setTimeout(() => setStatus(""), 2000);
      return;
    }

    setStatus("Looking up title…");

    let poster = "https://via.placeholder.com/300x450?text=No+Image";
    let year = "", rating = "", found = title;
    const omdbType = chosenType === "show" ? "series" : "movie";

    try {
      let res  = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&type=${omdbType}&apikey=${apiKey}`);
      let data = await res.json();

      if (data.Response === "True") {
        found  = data.Title  || title;
        poster = data.Poster && data.Poster !== "N/A" ? data.Poster : poster;
        year   = data.Year   && data.Year   !== "N/A" ? data.Year   : "";
        rating = data.imdbRating && data.imdbRating !== "N/A" ? data.imdbRating : "";
      }
    } catch (e) { /* use defaults */ }

    const firstWatched = watchlist.findIndex(w => w.watched);
    const insertAt     = firstWatched === -1 ? watchlist.length : firstWatched;
    watchlist.splice(insertAt, 0, { title: found, poster, year, rating, watched: false, type: chosenType });

    await saveWatchlist();
    updateWatchlistCount();
    renderWatchlist();
  }

  function removeFromWatchlist(title) {
    watchlist = watchlist.filter(w => w.title !== title);
    saveWatchlist();
    renderWatchlist();
    updateWatchlistCount();
  }

  function toggleWatched(title) {
    const item = watchlist.find(w => w.title === title);
    if (item) {
      item.watched = !item.watched;
      item.watchedAt = item.watched ? new Date().toISOString() : null;
      const unwatched = watchlist.filter(w => !w.watched);
      const watched   = watchlist.filter(w =>  w.watched);
      watchlist = [...unwatched, ...watched];
      saveWatchlist();
      renderWatchlist();
      renderRecentlyWatched();
    }
  }

  function updateWatchlistCount() {
    const el      = document.getElementById("watchlistCount");
    const pending = watchlist.filter(w => !w.watched).length;
    if (watchlist.length > 0) {
      el.style.display = "inline";
      el.textContent   = pending > 0 ? pending : "✓";
    } else {
      el.style.display = "none";
    }
  }

  // ── Watchlist: promote to site ────────────────────────────────────────
  async function promoteToSite(title, trailerURL, type) {
    if (type === "movie" && !trailerURL) { setStatus("Paste a trailer URL first!"); setTimeout(() => setStatus(""), 2000); return; }
    setStatus("Adding to site…");
    let action = "add";
    if (type === "show")  action = "addShow";
    if (type === "anime") action = "addAnime";
    try {
      await fetch(
        `${webAppURL}?action=${action}&title=${encodeURIComponent(title)}&trailer=${encodeURIComponent(trailerURL || "")}`,
        { redirect: "follow" }
      );
      removeFromWatchlist(title);
      if (type === "show")  await fetchShows();
      else if (type === "anime") await fetchAnime();
      else await fetchMovies();
      setStatus("Added to recommendations! ✓");
      setTimeout(() => setStatus(""), 3000);
    } catch (e) {
      setStatus("Failed to add to site");
      console.error(e);
    }
  }

  // ── Watchlist: render ─────────────────────────────────────────────────
  function renderWatchlist() {
    const el = document.getElementById("watchlistItems");
    updateWatchlistCount();

    const filtered = wlFilter === "all" ? watchlist : watchlist.filter(w => w.type === wlFilter);

    if (filtered.length === 0) {
      const msgs = { movie: "movies", show: "shows", anime: "anime" };
      const msg = wlFilter === "all"
        ? "Nothing here yet.<br>Type a title above to add it!"
        : `No ${msgs[wlFilter] || wlFilter} in your watchlist yet.`;
      el.innerHTML = `<div class="watchlist-empty">${msg}</div>`;
      return;
    }

    el.innerHTML = "";
    filtered.forEach(item => {
      const isShow  = item.type === "show";
      const isAnime = item.type === "anime";
      const div    = document.createElement("div");
      div.className = `watchlist-item${item.watched ? ' watched-item' : ''}${isShow ? ' is-show' : ''}${isAnime ? ' is-show' : ''}`;

      const typeLabel   = isAnime ? "Anime" : isShow ? "Show" : "Movie";
      const promoteLabel = isAnime ? "➕ Add to Anime" : isShow ? "➕ Add to Shows" : "➕ Add to Site";
      const needsTrailer = !isShow && !isAnime;

      div.innerHTML = `
        <div class="watchlist-item-main">
          <img src="${item.poster}" alt="${item.title}">
          <div class="watchlist-item-info">
            <div class="watchlist-item-title">${item.title}</div>
            <div class="watchlist-item-meta">${[item.year, item.rating ? '★ ' + item.rating : ''].filter(Boolean).join(' · ')}</div>
            <span class="wl-type-pill ${item.type}">${typeLabel}</span>
            ${isAdmin ? `
            <label class="watchlist-item-watched ${item.watched ? 'checked' : ''}">
              <input type="checkbox" ${item.watched ? 'checked' : ''}>${item.watched ? 'Watched ✓' : 'Mark as watched'}
            </label>` : `<span style="font-size:0.72rem;color:rgba(255,255,255,0.3)">${item.watched ? '✓ Watched' : ''}</span>`}
          </div>
          ${isAdmin ? `<button class="watchlist-item-remove" title="Remove">✕</button>` : ''}
        </div>
        ${isAdmin ? `
        <div class="watchlist-promote-row ${item.watched ? 'visible' : ''}">
          ${needsTrailer ? '<input type="text" placeholder="Paste trailer URL…" class="promote-input">' : ''}
          <button class="promote-btn">${promoteLabel}</button>
        </div>` : ''}
      `;

      div.querySelector("input[type='checkbox']")?.addEventListener("change", () => toggleWatched(item.title));
      div.querySelector(".watchlist-item-remove")?.addEventListener("click", () => removeFromWatchlist(item.title));
      div.querySelector(".promote-btn")?.addEventListener("click", () => {
        const inputEl = div.querySelector(".promote-input");
        const url = inputEl ? inputEl.value.trim() : "";
        promoteToSite(item.title, url, item.type);
      });

      el.appendChild(div);
    });

  // ── Sort / Count ──────────────────────────────────────────────────────
  function getTabConfig(tab) {
    const configs = {
      movies: { container: movieContainer, sortId: "sortMovies", countId: "countMovies", featuredId: "featuredMovies", label: "movie" },
      shows:  { container: showContainer,  sortId: "sortShows",  countId: "countShows",  featuredId: "featuredShows",  label: "show"  },
      anime:  { container: animeContainer, sortId: "sortAnime",  countId: "countAnime",  featuredId: "featuredAnime",  label: "anime" },
    };
    return configs[tab];
  }

  function applySearchSort(tab) {
    const cfg     = getTabConfig(tab);
    const sortVal = document.getElementById(cfg.sortId).value;
    const cards   = [...cfg.container.querySelectorAll(".movie-card")];

    cards.sort((a, b) => {
      if (sortVal === "rating") {
        return parseFloat(b.dataset.rating || 0) - parseFloat(a.dataset.rating || 0);
      }
      if (sortVal === "alpha") {
        const ta = a.querySelector(".movie-title")?.textContent || "";
        const tb = b.querySelector(".movie-title")?.textContent || "";
        return ta.localeCompare(tb);
      }
      const ta = a.dataset.addedAt ? new Date(a.dataset.addedAt).getTime() : -parseInt(a.dataset.index || 0);
      const tb = b.dataset.addedAt ? new Date(b.dataset.addedAt).getTime() : -parseInt(b.dataset.index || 0);
      return tb - ta;
    });
    cards.forEach(card => cfg.container.appendChild(card));

    const total  = cards.length;
    const label  = tab === "movies" ? "movie" : tab === "shows" ? "show" : "anime";
    const plural = label + (total !== 1 ? "s" : "");
    document.getElementById(cfg.countId).textContent = `${total} ${plural}`;
  }

  function wireToolbar(tab) {
    const cfg = getTabConfig(tab);
    document.getElementById(cfg.sortId).addEventListener("change", () => applySearchSort(tab));
  }

  // ── Featured Pin ──────────────────────────────────────────────────────
  function setPinned(tab, title) {
    pinned[tab] = title;
    savePinned();
    renderFeatured(tab);
    // Update pin button states in container
    const cfg = getTabConfig(tab);
    cfg.container.querySelectorAll(".movie-card").forEach(card => {
      const btn = card.querySelector(".pin-btn");
      if (!btn) return;
      const cardTitle = card.querySelector(".movie-title")?.textContent;
      btn.classList.toggle("pinned", cardTitle === title);
      btn.title = cardTitle === title ? "Unpin" : "Pin as Featured";
    });
  }

  function renderFeatured(tab) {
    const cfg = getTabConfig(tab);
    const el  = document.getElementById(cfg.featuredId);
    if (!pinned[tab]) { el.classList.remove("visible"); el.innerHTML = ""; return; }

    const title    = pinned[tab];
    const card     = [...getTabConfig(tab).container.querySelectorAll(".movie-card")]
      .find(c => c.querySelector(".movie-title")?.textContent === title);

    if (!card) { el.classList.remove("visible"); return; }

    const poster  = card.querySelector(".movie-poster")?.src || "";
    const rating  = card.querySelector(".movie-rating")?.textContent || "";
    const rColor  = card.querySelector(".movie-rating")?.style.color || "white";
    const meta    = card.querySelector(".movie-meta")?.textContent || "";
    const plot    = card.querySelector(".movie-description")?.textContent || "";
    const trailer = card.querySelector(".trailer-btn")?.href || null;
    const isShow  = cfg.label !== "movie";

    el.innerHTML = `
      <img class="featured-pin-poster" src="${poster}" alt="${title}">
      <div class="featured-pin-body">
        <div class="featured-pin-label">⭐ Featured Pick</div>
        <div class="featured-pin-title">${title}</div>
        <div class="featured-pin-meta" style="color:${rColor}">${rating}${meta ? ' · ' + meta : ''}</div>
        <div class="featured-pin-plot">${plot}</div>
        <div class="featured-pin-actions">
          ${!isShow && trailer ? `<a class="trailer-btn" href="${trailer}" target="_blank" rel="noopener noreferrer">▶ Trailer</a>` : ""}
          ${isAdmin ? `<button class="featured-unpin-btn">Unpin</button>` : ""}
        </div>
      </div>
    `;
    el.classList.add("visible");

    el.querySelector(".featured-unpin-btn")?.addEventListener("click", () => setPinned(tab, null));
  }

  // ── Generic card builder (uses cached data from sheet — no OMDB calls) ──
  function buildCard(item, index, skeletons, container, type) {
    const isShow  = type === "show";
    const isAnime = type === "anime";

    const poster      = item.poster  || "https://via.placeholder.com/300x450?text=No+Image";
    const ratingVal   = parseFloat(item.rating) || 0;
    const description = item.plot    || "No description available.";
    const year        = item.year    || "";
    const runtime     = item.runtime || "";
    const director    = item.director || "";
    const actors      = item.actors  || "";
    const seasons     = item.seasons ? `${item.seasons} seasons` : "";
    const genres      = item.genres
      ? item.genres.split(",").map(g => `<span class="genre-chip">${g.trim()}</span>`).join("") : "";

    let ratingColor = '#db2360';
    if (ratingVal >= 8) ratingColor = '#21d07a';
    else if (ratingVal >= 5) ratingColor = '#d2d531';

    const metaRight = (isShow || isAnime) ? seasons : runtime;
    const metaParts = [year, metaRight].filter(Boolean);
    const metaHTML  = metaParts.length ? `<div class="movie-meta">${metaParts.join('<span class="sep">·</span>')}</div>` : "";
    const genreHTML = genres ? `<div class="genre-chips">${genres}</div>` : "";
    const dirLabel  = (isShow || isAnime) ? "Creator" : "Dir.";
    const crewHTML  = (director || actors) ? `
      <div class="movie-crew">
        ${director ? `<div>${dirLabel} <span>${director}</span></div>` : ""}
        ${actors   ? `<div>Cast <span>${actors}</span></div>`          : ""}
      </div>` : "";

    const removeBtnHTML = isAdmin ? `<button class="remove-btn">Remove</button>` : "";
    let badgeHTML = "";
    if (isAnime) badgeHTML = `<span class="type-badge" style="background:#f97316">Anime</span>`;
    else if (isShow) badgeHTML = `<span class="type-badge">Show</span>`;

    const tab      = isAnime ? "anime" : isShow ? "shows" : "movies";
    const isPinned = pinned[tab] === item.title;

    const card = document.createElement("div");
    let cardClass = "movie-card";
    if (isAnime) cardClass += " anime-card";
    else if (isShow) cardClass += " show-card";
    card.className       = cardClass;
    card.dataset.rating  = ratingVal;
    card.dataset.index   = index;
    card.dataset.addedAt = item.addedAt || "";

    card.innerHTML = `
      <div class="poster-wrap">
        <img class="movie-poster" src="${poster}" alt="${item.title} Poster" loading="lazy">
        ${badgeHTML}
        ${isAdmin ? `<button class="pin-btn${isPinned ? ' pinned' : ''}" title="${isPinned ? 'Unpin' : 'Pin as Featured'}">📌</button>` : ""}
      </div>
      <div class="movie-info">
        <div class="movie-title">${item.title}</div>
        <div class="movie-rating" style="color:${ratingColor}">★ ${item.rating || "N/A"} IMDb</div>
        ${metaHTML}
        ${genreHTML}
        ${crewHTML}
        <div class="desc-wrap">
          <p class="movie-description">${description}</p>
          <button class="read-more-btn">Read more ›</button>
        </div>
        <div class="movie-actions">
          ${(isShow || isAnime) ? '' : `<a class="trailer-btn" href="${item.trailer}" target="_blank" rel="noopener noreferrer">▶ Trailer</a>`}
          ${removeBtnHTML}
        </div>
      </div>
    `;

    if (skeletons[index]) container.replaceChild(card, skeletons[index]);
    else container.appendChild(card);

    // Wire pin button
    const pinBtn = card.querySelector(".pin-btn");
    if (pinBtn) {
      pinBtn.addEventListener("click", (ev) => {
        ev.stopPropagation();
        setPinned(tab, pinned[tab] === item.title ? null : item.title);
      });
    }

    // Read more toggle
    const descEl = card.querySelector(".movie-description");
    const rmBtn  = card.querySelector(".read-more-btn");
    if (descEl.scrollHeight > descEl.clientHeight + 2) {
      rmBtn.style.display = "inline";
      rmBtn.addEventListener("click", () => {
        const expanded = descEl.classList.toggle("expanded");
        rmBtn.textContent = expanded ? "Read less ‹" : "Read more ›";
      });
    }

    // Remove button (admin only)
    if (isAdmin) {
      let removeAction = "remove";
      if (isShow)  removeAction = "removeShow";
      if (isAnime) removeAction = "removeAnime";
      card.querySelector(".remove-btn").addEventListener("click", async () => {
        if (confirm(`Remove "${item.title}"?`)) {
          try {
            await fetch(`${webAppURL}?action=${removeAction}&index=${index}`, { redirect: "follow" });
            if (isAnime) await fetchAnime();
            else if (isShow) await fetchShows();
            else await fetchMovies();
          } catch (err) {
            alert("Failed to remove.");
            console.error(err);
          }
        }
      });
    }

    // Apply sort now that card is in DOM
    applySearchSort(tab);
  }

  // ── Recently Added ────────────────────────────────────────────────────
  function renderRecentStrip() {
    const left      = document.querySelector(".recent-left");
    const container = document.getElementById("recentItems");

    // Combine all three, tag with type, sort by addedAt descending, take top 3
    const all = [
      ...movies.map(m => ({ ...m, type: "movie" })),
      ...shows.map(s  => ({ ...s, type: "show"  })),
      ...anime.map(a  => ({ ...a, type: "anime" })),
    ].sort((a, b) => {
      const ta = a.addedAt ? new Date(a.addedAt).getTime() : 0;
      const tb = b.addedAt ? new Date(b.addedAt).getTime() : 0;
      return tb - ta;
    });
    const recent = all.slice(0, 3);

    if (recent.length === 0) { left.style.display = "none"; return; }

    left.style.display = "flex";
    container.innerHTML = "";

    recent.forEach(item => {
      const isAnime  = item.type === "anime";
      const isShow   = item.type === "show";
      const typeLabel = isAnime ? "Anime" : isShow ? "Show" : "Movie";
      const poster    = item.poster || "https://via.placeholder.com/24x34?text=?";
      const year      = item.year   || "";

      const el = document.createElement("div");
      el.className = `recent-item${(isShow || isAnime) ? ' is-show' : ''}`;
      el.style.cursor = "pointer";
      el.innerHTML = `
        <img src="${poster}" alt="${item.title}">
        <div>
          <div class="recent-item-title">${item.title}</div>
          <div class="recent-item-meta">${year ? typeLabel + ' · ' + year : typeLabel}</div>
        </div>
        <span class="recent-new-badge">New</span>
      `;

      el.addEventListener("click", () => openModalForTitle(item.title, isShow || isAnime, item.trailer || null));
      container.appendChild(el);
    });
  }

  // ── Shared modal opener (uses cached data — no OMDB call) ────────────
  function openModalForTitle(title, isShow, trailerURL, label) {
    const isRandom = label === "🎲 Your Random Pick";
    document.getElementById("modalReroll").style.display = isRandom ? "inline-block" : "none";

    // Find cached item from arrays
    const allItems = [
      ...movies.map(m => ({ ...m, _type: "movie" })),
      ...shows.map(s  => ({ ...s, _type: "show"  })),
      ...anime.map(a  => ({ ...a, _type: "anime" })),
      ...watchlist.map(w => ({ ...w, _type: w.type || "movie" })),
    ];
    const item = allItems.find(i => i.title.toLowerCase() === title.toLowerCase()) || {};

    const ratingVal = parseFloat(item.rating) || 0;
    let ratingColor = '#db2360';
    if (ratingVal >= 8) ratingColor = '#21d07a';
    else if (ratingVal >= 5) ratingColor = '#d2d531';

    const poster  = item.poster  || "https://via.placeholder.com/480x260?text=No+Image";
    const year    = item.year    || "";
    const runtime = item.runtime || "";
    const seasons = item.seasons ? `${item.seasons} seasons` : "";
    const genres  = item.genres
      ? item.genres.split(",").map(g => `<span class="genre-chip">${g.trim()}</span>`).join("") : "";
    const isSeriesType = isShow || item._type === "show" || item._type === "anime";

    const modal = document.getElementById("randomPickModal");
    modal.className = isSeriesType ? "is-show" : "";

    document.getElementById("modalPoster").src        = poster;
    document.getElementById("modalPoster").alt        = title;
    document.getElementById("modalTitle").textContent  = title;
    document.getElementById("modalRating").textContent = `★ ${item.rating || "N/A"} IMDb`;
    document.getElementById("modalRating").style.color = ratingColor;
    document.getElementById("modalMeta").textContent   = [year, isSeriesType ? seasons : runtime].filter(Boolean).join(" · ");
    document.getElementById("modalGenres").innerHTML   = genres;
    document.getElementById("modalPlot").textContent   = item.plot || "";
    document.getElementById("modalLabel").textContent  = label || (isSeriesType ? "📺 Show / Anime" : "🎬 Movie");

    const trailerBtn = document.getElementById("modalTrailer");
    const trailer    = trailerURL || item.trailer || null;
    if (trailer && !isSeriesType) {
      trailerBtn.href          = trailer;
      trailerBtn.style.display = "inline-block";
    } else {
      trailerBtn.style.display = "none";
    }

    document.getElementById("randomPickOverlay").classList.add("open");
  }

  // ── Random Pick Modal ─────────────────────────────────────────────────
  function openRandomPick() {
    let pool;
    if (activeTab === "shows") pool = showContainer.querySelectorAll(".movie-card");
    else if (activeTab === "anime") pool = animeContainer.querySelectorAll(".movie-card");
    else pool = movieContainer.querySelectorAll(".movie-card");

    if (pool.length === 0) return;

    const pick    = pool[Math.floor(Math.random() * pool.length)];
    const isAnime = pick.classList.contains("anime-card");
    const isShow  = pick.classList.contains("show-card");
    const title   = pick.querySelector(".movie-title").textContent;
    const trailer = (!isShow && !isAnime) && pick.querySelector(".trailer-btn") ? pick.querySelector(".trailer-btn").href : null;

    openModalForTitle(title, isShow || isAnime, trailer, "🎲 Your Random Pick");
  }

  function closeRandomPick() {
    document.getElementById("randomPickOverlay").classList.remove("open");
  }

  document.getElementById("randomPickBtn").addEventListener("click", openRandomPick);
  document.getElementById("randomPickClose").addEventListener("click", closeRandomPick);
  document.getElementById("modalReroll").addEventListener("click", openRandomPick);
  document.getElementById("randomPickOverlay").addEventListener("click", e => {
    if (e.target === document.getElementById("randomPickOverlay")) closeRandomPick();
  });

  // ── Init ──────────────────────────────────────────────────────────────
  wireToolbar("movies");
  wireToolbar("shows");
  wireToolbar("anime");
  fetchWatchlist();
  fetchPinned().then(() => {
    fetchMovies();
    fetchShows();
    fetchAnime();
  });
</script>

</body>
</html>
