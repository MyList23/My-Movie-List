<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kevin Movie Recommendations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --blue: #278BF5;
      --blue-dark: #1a5dbb;
      --red: #e50914;
      --red-dark: #b20710;
      --green: #21d07a;
      --bg: #141414;
      --card-bg: #1a1a1a;
      --text-muted: rgba(255,255,255,0.5);
      --sidebar-width: 360px;
    }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: white;
    }

    /* ── Header ── */
    header {
      padding: 30px 40px;
      background: linear-gradient(180deg, #000 0%, #0a0a0a 100%);
      position: relative;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      color: var(--blue);
      margin: 0;
      font-size: 2.4rem;
      letter-spacing: 2px;
    }

    .subtitle {
      color: var(--text-muted);
      margin-top: 4px;
      font-size: 0.9rem;
    }

    .header-btns {
      position: absolute;
      top: 20px;
      right: 40px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .header-btns button {
      background-color: var(--blue);
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }

    .header-btns button:hover { background-color: var(--blue-dark); }

    #watchlistCount {
      display: none;
      background: white;
      color: var(--blue);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-left: 4px;
    }

    /* ── Admin form ── */
    #adminForm {
      display: none;
      padding: 16px 40px;
      background-color: #111;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    #adminForm input {
      padding: 7px 12px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #1f1f1f;
      color: white;
      width: 220px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
    }

    #adminForm input::placeholder { color: rgba(255,255,255,0.35); }

    #adminForm button {
      padding: 7px 14px;
      border: none;
      border-radius: 4px;
      background-color: var(--blue);
      color: white;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      transition: background 0.2s;
    }

    #adminForm button:hover { background-color: var(--blue-dark); }

    /* ── Grid ── */
    .movie-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
      padding: 40px;
    }

    /* ── Card ── */
    .movie-card {
      background-color: var(--card-bg);
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .movie-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .poster-wrap {
      position: relative;
      overflow: hidden;
    }

    .movie-poster {
      width: 100%;
      height: 310px;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }

    .movie-card:hover .movie-poster { transform: scale(1.04); }

    .movie-info {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .movie-title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 5px;
    }

    .movie-rating {
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .movie-meta {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.38);
      margin-bottom: 8px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .movie-meta .sep { opacity: 0.5; }

    .genre-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }

    .genre-chip {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid rgba(39,139,245,0.35);
      color: rgba(39,139,245,0.85);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .movie-crew {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.42);
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .movie-crew span {
      color: rgba(255,255,255,0.65);
      font-weight: 500;
    }

    .desc-wrap {
      position: relative;
      margin-bottom: 14px;
      flex: 1;
    }

    .movie-description {
      font-size: 0.8rem;
      line-height: 1.55;
      color: rgba(255,255,255,0.6);
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .movie-description.expanded {
      display: block;
      overflow: visible;
      -webkit-line-clamp: unset;
      -webkit-box-orient: unset;
    }

    .read-more-btn {
      background: none;
      border: none;
      padding: 0;
      margin-top: 4px;
      color: var(--blue);
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: none;
    }

    .read-more-btn:hover { text-decoration: underline; }

    .movie-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .trailer-btn {
      display: inline-block;
      padding: 6px 12px;
      background-color: var(--red);
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 500;
      transition: background 0.2s;
    }

    .trailer-btn:hover { background-color: var(--red-dark); }

    .remove-btn {
      background: rgba(255,255,255,0.08);
      padding: 6px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      color: rgba(255,255,255,0.6);
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s, color 0.2s;
    }

    .remove-btn:hover { background: rgba(255,80,80,0.2); color: #ff6b6b; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #1f1f1f 25%, #2a2a2a 50%, #1f1f1f 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 10px;
      height: 420px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .loading-text {
      padding: 60px 40px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* ── Watchlist Sidebar ── */
    #watchlistOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      backdrop-filter: blur(2px);
    }

    #watchlistOverlay.open { display: block; }

    #watchlistSidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: #111;
      border-left: 1px solid rgba(255,255,255,0.08);
      z-index: 101;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    #watchlistSidebar.open { transform: translateX(0); }

    #watchlistHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    #watchlistClose {
      background: rgba(255,255,255,0.07);
      border: none;
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    #watchlistClose:hover { background: rgba(255,255,255,0.15); }

    /* Add to watchlist input row */
    #watchlistAddRow {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    #watchlistAddRow input {
      flex: 1;
      padding: 7px 10px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #1a1a1a;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
    }

    #watchlistAddRow input::placeholder { color: rgba(255,255,255,0.3); }

    #watchlistAddRow button {
      padding: 7px 12px;
      border: none;
      border-radius: 5px;
      background: var(--blue);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #watchlistAddRow button:hover { background: var(--blue-dark); }

    #watchlistItems {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #watchlistItems::-webkit-scrollbar { width: 4px; }
    #watchlistItems::-webkit-scrollbar-track { background: transparent; }
    #watchlistItems::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .watchlist-empty {
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 0.85rem;
      line-height: 1.7;
      margin-top: 40px;
    }

    /* Watchlist item card */
    .watchlist-item {
      background: #1a1a1a;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden;
      animation: slideIn 0.2s ease;
    }

    .watchlist-item.watched-item {
      opacity: 0.55;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .watchlist-item-main {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 10px;
    }

    .watchlist-item img {
      width: 46px;
      height: 66px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: #333;
    }

    .watchlist-item-info {
      flex: 1;
      min-width: 0;
    }

    .watchlist-item-title {
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .watchlist-item-meta {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
    }

    .watchlist-item-watched {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      user-select: none;
    }

    .watchlist-item-watched input[type="checkbox"] {
      accent-color: var(--green);
      cursor: pointer;
      width: 13px;
      height: 13px;
    }

    .watchlist-item-watched.checked { color: var(--green); }

    .watchlist-item-remove {
      background: none;
      border: none;
      color: rgba(255,255,255,0.2);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
      align-self: flex-start;
    }

    .watchlist-item-remove:hover { color: #ff6b6b; background: rgba(255,80,80,0.1); }

    /* Promote row — shown when watched */
    .watchlist-promote-row {
      display: none;
      padding: 8px 10px 10px;
      border-top: 1px solid rgba(255,255,255,0.05);
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .watchlist-promote-row.visible { display: flex; }

    .watchlist-promote-row input {
      flex: 1;
      min-width: 0;
      padding: 5px 8px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #222;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
    }

    .watchlist-promote-row input::placeholder { color: rgba(255,255,255,0.3); }

    .promote-btn {
      padding: 5px 10px;
      border: none;
      border-radius: 4px;
      background: var(--green);
      color: #000;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .promote-btn:hover { opacity: 0.85; }

    .watchlist-status {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      text-align: center;
      padding: 10px;
      flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,0.05);
      min-height: 36px;
    }
  </style>
</head>

<body>

<header>
  <h1>Kevin's Movie Recommendations</h1>
  <div class="subtitle">Hand-picked movies worth your time</div>
  <div class="header-btns">
    <button id="watchlistToggle">🎬 Watchlist <span id="watchlistCount"></span></button>
    <button id="adminButton">Admin Mode</button>
  </div>
</header>

<div id="adminForm">
  <input type="text" id="newMovieTitle" placeholder="Movie Title">
  <input type="text" id="newMovieTrailer" placeholder="Trailer URL">
  <button id="addMovieBtn">Add Movie</button>
</div>

<!-- Watchlist Sidebar -->
<div id="watchlistOverlay"></div>
<div id="watchlistSidebar">
  <div id="watchlistHeader">
    <span style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:1px;color:var(--blue)">🎬 My Watchlist</span>
    <button id="watchlistClose">✕</button>
  </div>

  <div id="watchlistAddRow">
    <input type="text" id="watchlistInput" placeholder="Add a movie to check out…">
    <button id="watchlistAddBtn">+ Add</button>
  </div>

  <div id="watchlistItems">
    <div class="watchlist-empty">Nothing here yet.<br>Type a title above to add it!</div>
  </div>
  <div class="watchlist-status" id="watchlistStatus"></div>
</div>

<div class="movie-container" id="movieContainer">
  <div class="loading-text">Loading movies…</div>
</div>

<script>
  const apiKey        = "f994ef9b";
  const adminPassword = "kevin123";
  const webAppURL     = "https://script.google.com/macros/s/AKfycbx39rXvDXduoYIrGF75V5sGs3elqTXrdZQn-DNaF4_fLda73ZWMyaGYw0LBSEArPIBBaw/exec";

  let isAdmin   = false;
  let movies    = [];
  let watchlist = []; // [{ title, poster, year, rating, watched }]

  const container = document.getElementById("movieContainer");

  // ── Watchlist: load & save ────────────────────────────────────────────
  async function fetchWatchlist() {
    try {
      const res  = await fetch(`${webAppURL}?action=getWatchlist`, { redirect: "follow" });
      const data = await res.json();
      watchlist  = Array.isArray(data) ? data : [];
    } catch (e) {
      console.warn("Could not load watchlist:", e);
      watchlist = [];
    }
    renderWatchlist();
  }

  async function saveWatchlist() {
    setStatus("Saving…");
    try {
      await fetch(
        `${webAppURL}?action=saveWatchlist&data=${encodeURIComponent(JSON.stringify(watchlist))}`,
        { redirect: "follow" }
      );
      setStatus("Saved ✓");
      setTimeout(() => setStatus(""), 2500);
    } catch (e) {
      setStatus("Save failed");
      console.error(e);
    }
  }

  function setStatus(msg) {
    document.getElementById("watchlistStatus").textContent = msg;
  }

  // ── Watchlist: add by typing title ───────────────────────────────────
  async function addToWatchlist(title) {
    if (!title) return;
    if (watchlist.some(w => w.title.toLowerCase() === title.toLowerCase())) {
      setStatus("Already in your watchlist!");
      setTimeout(() => setStatus(""), 2000);
      return;
    }

    setStatus("Looking up movie…");

    // Fetch OMDB data so we have the poster, year, rating right away
    let poster = "https://via.placeholder.com/300x450?text=No+Image";
    let year   = "";
    let rating = "";
    let found  = title; // may be corrected by OMDB

    try {
      const res  = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${apiKey}`);
      const data = await res.json();
      if (data.Response === "True") {
        found  = data.Title || title;
        poster = data.Poster && data.Poster !== "N/A" ? data.Poster : poster;
        year   = data.Year   && data.Year   !== "N/A" ? data.Year   : "";
        rating = data.imdbRating && data.imdbRating !== "N/A" ? data.imdbRating : "";
      }
    } catch (e) { /* use defaults */ }

    watchlist.push({ title: found, poster, year, rating, watched: false });
    await saveWatchlist();
    updateWatchlistCount();
    renderWatchlist();
  }

  function removeFromWatchlist(title) {
    watchlist = watchlist.filter(w => w.title !== title);
    saveWatchlist();
    renderWatchlist();
    updateWatchlistCount();
  }

  function toggleWatched(title) {
    const item = watchlist.find(w => w.title === title);
    if (item) {
      item.watched = !item.watched;
      // Unwatched float to top, watched sink to bottom (stable sort)
      const unwatched = watchlist.filter(w => !w.watched);
      const watched   = watchlist.filter(w =>  w.watched);
      watchlist = [...unwatched, ...watched];
      saveWatchlist();
      renderWatchlist();
    }
  }

  function updateWatchlistCount() {
    const el      = document.getElementById("watchlistCount");
    const pending = watchlist.filter(w => !w.watched).length;
    if (watchlist.length > 0) {
      el.style.display = "inline";
      el.textContent   = pending > 0 ? pending : "✓";
    } else {
      el.style.display = "none";
    }
  }

  // ── Watchlist: promote to main site ──────────────────────────────────
  async function promoteToSite(title, trailerURL) {
    if (!trailerURL) { setStatus("Paste a trailer URL first!"); setTimeout(() => setStatus(""), 2000); return; }
    setStatus("Adding to site…");
    try {
      await fetch(
        `${webAppURL}?action=add&title=${encodeURIComponent(title)}&trailer=${encodeURIComponent(trailerURL)}`,
        { redirect: "follow" }
      );
      // Remove from watchlist now that it's on the main site
      removeFromWatchlist(title);
      await fetchMovies();
      setStatus("Added to recommendations! ✓");
      setTimeout(() => setStatus(""), 3000);
    } catch (e) {
      setStatus("Failed to add to site");
      console.error(e);
    }
  }

  // ── Watchlist: render sidebar ─────────────────────────────────────────
  function renderWatchlist() {
    const el = document.getElementById("watchlistItems");
    updateWatchlistCount();

    if (watchlist.length === 0) {
      el.innerHTML = `<div class="watchlist-empty">Nothing here yet.<br>Type a title above to add it!</div>`;
      return;
    }

    el.innerHTML = "";
    watchlist.forEach(item => {
      const div     = document.createElement("div");
      div.className = `watchlist-item${item.watched ? ' watched-item' : ''}`;

      div.innerHTML = `
        <div class="watchlist-item-main">
          <img src="${item.poster}" alt="${item.title}">
          <div class="watchlist-item-info">
            <div class="watchlist-item-title">${item.title}</div>
            <div class="watchlist-item-meta">${[item.year, item.rating ? '★ ' + item.rating : ''].filter(Boolean).join(' · ')}</div>
            <label class="watchlist-item-watched ${item.watched ? 'checked' : ''}">
              <input type="checkbox" ${item.watched ? 'checked' : ''}>${item.watched ? 'Watched ✓' : 'Mark as watched'}
            </label>
          </div>
          <button class="watchlist-item-remove" title="Remove">✕</button>
        </div>
        <div class="watchlist-promote-row ${item.watched ? 'visible' : ''}">
          <input type="text" placeholder="Paste trailer URL to recommend it…" class="promote-input">
          <button class="promote-btn">➕ Add to Site</button>
        </div>
      `;

      div.querySelector("input[type='checkbox']").addEventListener("change", function() { toggleWatched(item.title); });
      div.querySelector(".watchlist-item-remove").addEventListener("click", () => removeFromWatchlist(item.title));
      div.querySelector(".promote-btn").addEventListener("click", () => {
        const url = div.querySelector(".promote-input").value.trim();
        promoteToSite(item.title, url);
      });

      el.appendChild(div);
    });
  }

  // ── Sidebar open / close ──────────────────────────────────────────────
  function openSidebar()  {
    document.getElementById("watchlistSidebar").classList.add("open");
    document.getElementById("watchlistOverlay").classList.add("open");
    document.getElementById("watchlistInput").focus();
  }

  function closeSidebar() {
    document.getElementById("watchlistSidebar").classList.remove("open");
    document.getElementById("watchlistOverlay").classList.remove("open");
  }

  document.getElementById("watchlistToggle").addEventListener("click", openSidebar);
  document.getElementById("watchlistClose").addEventListener("click", closeSidebar);
  document.getElementById("watchlistOverlay").addEventListener("click", closeSidebar);

  document.getElementById("watchlistAddBtn").addEventListener("click", () => {
    const input = document.getElementById("watchlistInput");
    const val   = input.value.trim();
    if (val) { addToWatchlist(val); input.value = ""; }
  });

  document.getElementById("watchlistInput").addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const input = document.getElementById("watchlistInput");
      const val   = input.value.trim();
      if (val) { addToWatchlist(val); input.value = ""; }
    }
  });

  // ── Movies ────────────────────────────────────────────────────────────
  async function fetchMovies() {
    try {
      const res = await fetch(webAppURL, { redirect: "follow" });
      movies    = await res.json();
      renderMovies();
    } catch (err) {
      console.error("Error fetching movies:", err);
      container.innerHTML = "<p style='padding:40px;color:rgba(255,255,255,0.4)'>Failed to load movies.</p>";
    }
  }

  function renderMovies() {
    container.innerHTML = "";
    movies.forEach(() => {
      const skel = document.createElement("div");
      skel.className = "skeleton";
      container.appendChild(skel);
    });

    const movieSnapshot = [...movies];
    const skeletons     = container.querySelectorAll(".skeleton");

    movieSnapshot.forEach((movie, index) => {
      fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(movie.title)}&apikey=${apiKey}`)
        .then(res => res.json())
        .then(data => {
          const poster = data.Poster && data.Poster !== "N/A"
            ? data.Poster : "https://via.placeholder.com/300x450?text=No+Image";

          const rating = data.imdbRating && data.imdbRating !== "N/A"
            ? parseFloat(data.imdbRating) : 0;

          let ratingColor = '#db2360';
          if (rating >= 8) ratingColor = '#21d07a';
          else if (rating >= 5) ratingColor = '#d2d531';

          const description = data.Plot     && data.Plot     !== "N/A" ? data.Plot     : "No description available.";
          const year        = data.Year     && data.Year     !== "N/A" ? data.Year     : "";
          const runtime     = data.Runtime  && data.Runtime  !== "N/A" ? data.Runtime  : "";
          const director    = data.Director && data.Director !== "N/A" ? data.Director : "";
          const actors      = data.Actors   && data.Actors   !== "N/A" ? data.Actors   : "";
          const genres      = data.Genre    && data.Genre    !== "N/A"
            ? data.Genre.split(",").map(g => `<span class="genre-chip">${g.trim()}</span>`).join("") : "";

          const metaParts = [year, runtime].filter(Boolean);
          const metaHTML  = metaParts.length ? `<div class="movie-meta">${metaParts.join('<span class="sep">·</span>')}</div>` : "";
          const genreHTML = genres ? `<div class="genre-chips">${genres}</div>` : "";
          const crewHTML  = (director || actors) ? `
            <div class="movie-crew">
              ${director ? `<div>Dir. <span>${director}</span></div>` : ""}
              ${actors   ? `<div>Cast <span>${actors}</span></div>`   : ""}
            </div>` : "";

          const removeBtnHTML = isAdmin ? `<button class="remove-btn">Remove</button>` : "";

          const card     = document.createElement("div");
          card.className = "movie-card";
          card.innerHTML = `
            <div class="poster-wrap">
              <img class="movie-poster" src="${poster}" alt="${movie.title} Poster" loading="lazy">
            </div>
            <div class="movie-info">
              <div class="movie-title">${movie.title}</div>
              <div class="movie-rating" style="color:${ratingColor}">★ ${data.imdbRating || "N/A"} IMDb</div>
              ${metaHTML}
              ${genreHTML}
              ${crewHTML}
              <div class="desc-wrap">
                <p class="movie-description">${description}</p>
                <button class="read-more-btn">Read more ›</button>
              </div>
              <div class="movie-actions">
                <a class="trailer-btn" href="${movie.trailer}" target="_blank" rel="noopener noreferrer">▶ Trailer</a>
                ${removeBtnHTML}
              </div>
            </div>
          `;

          if (skeletons[index]) container.replaceChild(card, skeletons[index]);
          else container.appendChild(card);

          const descEl = card.querySelector(".movie-description");
          const rmBtn  = card.querySelector(".read-more-btn");
          if (descEl.scrollHeight > descEl.clientHeight + 2) {
            rmBtn.style.display = "inline";
            rmBtn.addEventListener("click", () => {
              const expanded = descEl.classList.toggle("expanded");
              rmBtn.textContent = expanded ? "Read less ‹" : "Read more ›";
            });
          }

          if (isAdmin) {
            card.querySelector(".remove-btn").addEventListener("click", async () => {
              if (confirm(`Remove "${movie.title}" from the list?`)) {
                try {
                  await fetch(`${webAppURL}?action=remove&index=${index}`, { redirect: "follow" });
                  await fetchMovies();
                } catch (err) {
                  alert("Failed to remove movie.");
                  console.error(err);
                }
              }
            });
          }
        })
        .catch(err => {
          console.error(`Error fetching OMDB for ${movie.title}:`, err);
          if (skeletons[index]) skeletons[index].remove();
        });
    });
  }

  // ── Admin ─────────────────────────────────────────────────────────────
  document.getElementById("adminButton").addEventListener("click", () => {
    const password = prompt("Enter admin password:");
    if (password === adminPassword) {
      isAdmin = true;
      document.getElementById("adminForm").style.display = "flex";
      document.getElementById("adminButton").textContent = "Admin: ON";
      renderMovies();
      alert("Admin mode unlocked!");
    } else {
      alert("Incorrect password!");
    }
  });

  document.getElementById("addMovieBtn").addEventListener("click", async () => {
    const title   = document.getElementById("newMovieTitle").value.trim();
    const trailer = document.getElementById("newMovieTrailer").value.trim();
    if (!title || !trailer) { alert("Please enter both a movie title and trailer URL!"); return; }
    try {
      await fetch(`${webAppURL}?action=add&title=${encodeURIComponent(title)}&trailer=${encodeURIComponent(trailer)}`, { redirect: "follow" });
      document.getElementById("newMovieTitle").value   = "";
      document.getElementById("newMovieTrailer").value = "";
      await fetchMovies();
    } catch (err) {
      alert("Failed to add movie.");
      console.error(err);
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────
  fetchWatchlist();
  fetchMovies();
</script>

</body>
</html>
